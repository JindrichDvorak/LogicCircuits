<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logic Circuits</title>
    <link rel="icon" type="image/x-icon" href="/SRlatch.svg">
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body id="body" style="position: relative">
    <div id="header" style="height: 30px; border: solid 1px; display: flex;">
      <div id="fileNameInput" style="flex-grow: 1; text-align: center; align-content: center;" 
        contenteditable="true" spellcheck="false">Logic circuit</div>
      <div style="width: fit-content; display: flex;">
        <select id="saveTarget">
          <option value="browser">Save to Browser</option>
          <option value="file">Save to File</option>
        </select>
        <button id="saveButton" style="width: fit-content;">Save</button>
        <button id="loadButton" style="width: fit-content;">Load</button>
        <input id="fileInput" type="file" accept=".json" hidden>
        <button id="clearButton" style="width: fit-content; background: crimson;">Clear</button>
      </div>
    </div>
    <div style="display: flex; flex-direction: row; height: calc(100vh - 32px);">
      <div id="controls" style="width: 90px; border: solid 1px; overflow: scroll;">
        <hr style="margin-top: 0px;">
        <div>
          <input type="checkbox" id="showGrid" name="showGrid" />
          <label for="showGrid">Grid</label>
        </div>
        <div>
          <input type="checkbox" id="lock" name="lock" />
          <label for="lock">Lock</label>
        </div>
        <hr>
        <button id="newInput" style="width: 100%;">Input</button>
        <button id="newOutput" style="width: 100%;">Output</button>
        <button id="newNodeJoint" style="width: 100%;">Node</button>
        <button id="newTextField" style="width: 100%;">Text</button>

        <hr>
        <details>
          <summary style="user-select: none; padding-left: 5px;">RTL</summary>
        <hr>
          <button id="newTransistor" style="width: 100%;">Transistor</button>
          <button id="newResistor" style="width: 100%;">Resistor</button>
          <button id="newGround" style="width: 100%;">Ground</button>
        </details>

        <hr>
        <details>
          <summary style="user-select: none; padding-left: 5px;">Gates</summary>
        <hr>
          <button id="newBuffer" style="width: 100%;">Buffer</button>
          <button id="newNOT" style="width: 100%;">NOT</button>
          <hr>
          <button id="newAND" style="width: 100%;">AND</button>
          <button id="newNAND" style="width: 100%;">NAND</button>
          <hr>
          <button id="newOR" style="width: 100%;">OR</button>
          <button id="newNOR" style="width: 100%;">NOR</button>
          <hr>
          <button id="newXOR" style="width: 100%;">XOR</button>
          <button id="newNXOR" style="width: 100%;">NXOR</button>
        </details>
        
        <hr>
        <details>
          <summary style="user-select: none; padding-left: 5px;">Circuits</summary>
        <hr>
          <button id="new2bitInput" style="width: 100%;">2-bit input</button>
          <button id="new3bitInput" style="width: 100%;">3-bit input</button>
          <button id="new4bitInput" style="width: 100%;">4-bit input</button>
          <button id="new8bitInput" style="width: 100%;">8-bit input</button>
          <hr>
          <button id="new2bitOutput" style="width: 100%;">2-bit output</button>
          <button id="new3bitOutput" style="width: 100%;">3-bit output</button>
          <button id="new4bitOutput" style="width: 100%;">4-bit output</button>
          <button id="new8bitOutput" style="width: 100%;">8-bit output</button>
          <hr>
          <button id="newHalfAdder" style="width: 100%;">Half adder</button>
          <button id="newFullAdder" style="width: 100%;">Full adder</button>
          <hr>
          <button id="new2to1MUX" style="width: 100%;">2-1 MUX</button>
          <button id="new4to1MUX" style="width: 100%;">4-1 MUX</button>
          <button id="new8to1MUX" style="width: 100%;">8-1 MUX</button>
          <hr>
          <button id="new1to2DEMUX" style="width: 100%;">1-2 DEMUX</button>
          <button id="new1to4DEMUX" style="width: 100%;">1-4 DEMUX</button>
          <button id="new1to8DEMUX" style="width: 100%;">1-8 DEMUX</button>
        </details>
        <hr style="margin-bottom: 0px;">
      </div>
      <!-- * Camera and rendering -->
      <div id="scene" style="position: relative; flex-grow: 1; overflow: hidden; border: solid 1px;">
        <div id="world" style="position: absolute;"></div>
      </div>
      <!-- * Camera and rendering -->
      <!--<div id="interactionInfo">Test</div>-->
      <!-- TODO: Remove Debug UI -->
      <div id="debugUI"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>

  </body>

</html>
