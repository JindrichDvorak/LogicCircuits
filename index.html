<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logic Circuits</title>
    <link rel="icon" type="image/x-icon" href="/SRlatch.svg">
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body id="body" style="position: relative">
    <div id="header" style="height: 30px; border: solid 1px; display: flex;">
      <div id="fileNameInput" style="flex-grow: 1; text-align: center; align-content: center;" 
        contenteditable="true" spellcheck="false">Logic circuit</div>
      <div style="width: fit-content; display: flex;">
        <button id="saveButton" style="width: fit-content;">Save</button>
        <button id="loadButton" style="width: fit-content;">Load</button>
        <input id="fileInput" type="file" accept=".json" hidden>
        <button id="clearButton" style="width: fit-content; background: crimson;">Clear</button>
      </div>
    </div>
    <div style="display: flex; flex-direction: row; height: calc(100vh - 32px);">
      <div id="controls" style="width: min-content; border: solid 1px;">
        <button id="newInput" style="width: 100%;">New input</button>
        <button id="newOutput" style="width: 100%;">New output</button>
        <button id="newTextField" style="width: 100%;">New text</button>

        <hr>
        <div style="text-align: center;">RTL</div>
        <hr>

        <button id="newTransistor" style="width: 100%;">New transistor</button>
        <button id="newResistor" style="width: 100%;">New resistor</button>
        <button id="newGround" style="width: 100%;">New ground</button>

        <hr>
        <div style="text-align: center;">Gates</div>
        <hr>

        <button id="newBuffer" style="width: 100%;">New buffer</button>
        <button id="newNOT" style="width: 100%;">New NOT</button>
        <button id="newAND" style="width: 100%;">New AND</button>
        <button id="newNAND" style="width: 100%;">New NAND</button>
        <button id="newOR" style="width: 100%;">New OR</button>
        <button id="newNOR" style="width: 100%;">New NOR</button>
        <button id="newXOR" style="width: 100%;">New XOR</button>
        <button id="newNXOR" style="width: 100%;">New NXOR</button>

        <hr>
        <div style="text-align: center;">Circuits</div>
        <hr>

        <button id="newHalfAdder" style="width: 100%;">New half adder</button>
        <button id="newFullAdder" style="width: 100%;">New full adder</button>
      </div>
      <!-- * Camera and rendering -->
      <div id="scene" style="position: relative; flex-grow: 1; overflow: hidden; 
        border: solid 1px;">
        <div id="world" style="position: absolute;"></div>
      </div>
      <!-- * Camera and rendering -->
      <div id="interactionInfo">Test</div>
      <!-- TODO: Remove Debug UI -->
      <div id="debugUI"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>

  </body>

</html>
